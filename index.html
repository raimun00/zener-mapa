<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zener - Mapa de Obras</title>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/raimun00/zener-mapa/main/obras.json";
  const AUTO_REFRESH_MIN = 5;
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root{--azul:#1F3864;--azul2:#2d5096;--accent:#f0a500;--fondo:#f2f4f8;--panel:#fff;--borde:#dde3ed;--texto:#1a2340;--sub:#5a6a8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--fondo);color:var(--texto);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--azul);color:white;height:50px;padding:0 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:1000}
.logo{font-size:17px;font-weight:600}.logo em{color:var(--accent);font-style:normal}
#badge{background:var(--accent);color:var(--azul);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
#hinfo{font-size:11px;color:rgba(255,255,255,.55);margin-left:auto;font-family:"IBM Plex Mono",monospace}
#btn-refresh{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px}
.main{display:flex;flex:1;overflow:hidden;position:relative}
#panel{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--borde);display:flex;flex-direction:column;overflow:hidden;z-index:800}
.ph{background:var(--azul);color:white;padding:11px 14px;font-size:11px;font-weight:700;text-transform:uppercase}
.filtros{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px}
.fg select,.fg input{width:100%;padding:6px 9px;border:1px solid var(--borde);border-radius:4px;font-size:12px}
#btn-reset{margin:0 10px 10px;border:1px solid var(--borde);background:none;color:var(--sub);padding:6px;border-radius:4px;cursor:pointer;font-size:11px}
.stats{border-top:1px solid var(--borde);padding:10px;max-height:220px;overflow-y:auto}
.sf{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--fondo)}
.sn{font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--azul);background:var(--fondo);padding:0 6px;border-radius:8px}
#mapa{flex:1;height:100%}
#ov{position:absolute;inset:0;background:rgba(242,244,248,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1001}
.hide{display:none !important}
.spin{width:34px;height:34px;border:3px solid var(--borde);border-top-color:var(--azul);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Estilos mejorados del Popup */
.pw{min-width:240px}
.pc{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--sub);margin-bottom:3px}
.pn{font-size:14px;font-weight:700;color:var(--azul);margin-bottom:6px;line-height:1.3}
.pb{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:7px}
.pl{font-size:11px;margin-bottom:3px}.pl b{color:var(--sub);font-weight:500}
.p-desc{margin-top:8px;padding-top:8px;border-top:1px solid #eee;font-size:11px;font-style:italic;color:var(--sub);line-height:1.4}
.pm{display:block;margin-top:10px;text-align:center;background:var(--azul);color:white;padding:6px 10px;border-radius:4px;text-decoration:none;font-size:11px;font-weight:700}

/* Colores de etiquetas según estado */
.e-EO{background:#d1e7dd;color:#0a5c36}
.e-PI{background:#fff3cd;color:#856404}
.e-FI{background:#cfe2ff;color:#0a3678}
.e-XX{background:#e2e3e5;color:#41464b}
</style>
</head>
<body>

<header>
  <div class="logo">&#9889; Zener <em>Obras</em></div>
  <span id="badge">0 obras</span>
  <span id="hinfo">Cargando...</span>
  <button id="btn-refresh" onclick="cargarDatos()">&#8635; Actualizar</button>
</header>

<div class="main">
  <div id="panel">
    <div class="ph">&#128269; Filtros</div>
    <div class="filtros">
      <div class="fg"><label>Buscar nombre / codigo</label><input type="text" id="f-q" oninput="filtrar()"></div>
      <div class="fg"><label>Estado</label><select id="f-est" onchange="filtrar()"><option value="">Todos</option></select></div>
      <div class="fg"><label>Provincia</label><select id="f-prov" onchange="filtrar()"><option value="">Todas</option></select></div>
      <div class="fg"><label>Proyecto</label><select id="f-proy" onchange="filtrar()"><option value="">Todos</option></select></div>
      <div class="fg"><label>Tipo obra</label><select id="f-tipo" onchange="filtrar()"><option value="">Todos</option></select></div>
      <div class="fg"><label>Gestor</label><select id="f-gest" onchange="filtrar()"><option value="">Todos</option></select></div>
    </div>
    <button id="btn-reset" onclick="reset()">&#10005; Limpiar filtros</button>
    <div class="stats"><div id="stats"></div></div>
  </div>
  <div style="flex:1; position:relative;">
    <div id="ov"><div class="spin"></div><p>Actualizando mapa...</p></div>
    <div id="mapa"></div>
  </div>
</div>

<script>
// Configuración de colores para los puntos
const COL={
  "EJECUCION DE OBRA":"#198754",
  "FINALIZADA":"#0d6efd",
  "PENDIENTE INICIO":"#f0a500",
  "REPAROS":"#dc3545",
  "VALIDACION T-E":"#adb5bd",
  "DEFINICION T-E":"#adb5bd"
};

// Clases CSS para las etiquetas del popup
const CSS_EST={
  "EJECUCION DE OBRA":"e-EO",
  "PENDIENTE INICIO":"e-PI",
  "FINALIZADA":"e-FI"
};

let obras=[], mapa=null, capa=null;

function initMapa(){
  if(mapa) return;
  mapa = L.map("mapa").setView([40.4,-3.7], 6);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution: "&copy; CARTO",
    maxZoom: 19
  }).addTo(mapa);
  capa = L.layerGroup().addTo(mapa);
  setTimeout(() => { mapa.invalidateSize(); }, 500);
}

async function cargarDatos(){
  try {
    const r = await fetch(JSON_URL + "?t=" + Date.now());
    const data = await r.json();
    // Procesamos los datos asegurando que sea un array
    obras = Array.isArray(data) ? data : (typeof data === 'string' ? JSON.parse(data) : data.obras || []);
    
    initMapa();
    poblarSelects();
    filtrar();
    document.getElementById("ov").classList.add("hide");
    document.getElementById("hinfo").textContent = "Actualizado: " + new Date().toLocaleTimeString();
  } catch(e) { 
    console.error("Error al cargar JSON:", e); 
  }
}

function poblarSelects(){
  [["f-est","estado"],["f-prov","provincia"],["f-proy","proyecto"],["f-tipo","tipo"],["f-gest","gestor"]].forEach(([id,k])=>{
    const s=document.getElementById(id), prev=s.value;
    const vals=[...new Set(obras.map(o=>o[k]).filter(Boolean))].sort();
    s.innerHTML="<option value=''>Todos</option>";
    vals.forEach(v=>{ const o=document.createElement("option"); o.value=o.textContent=v; s.appendChild(o); });
    if(prev) s.value = prev;
  });
}

function filtrar(){
  const q=document.getElementById("f-q").value.toLowerCase();
  const fEst=document.getElementById("f-est").value;
  const fProv=document.getElementById("f-prov").value;
  const fProy=document.getElementById("f-proy").value;
  const fTipo=document.getElementById("f-tipo").value;
  const fGest=document.getElementById("f-gest").value;

  const vis = obras.filter(o => 
    (!q || (o.nombre||"").toLowerCase().includes(q) || (o.codigo||"").toLowerCase().includes(q)) &&
    (!fEst || o.estado === fEst) &&
    (!fProv || o.provincia === fProv) &&
    (!fProy || o.proyecto === fProy) &&
    (!fTipo || o.tipo === fTipo) &&
    (!fGest || o.gestor === fGest)
  );

  capa.clearLayers();
  vis.forEach(o => {
    if(!o.lat || !o.lng) return;
    
    const color = COL[o.estado] || "#607d8b";
    const etiquetaClase = CSS_EST[o.estado] || "e-XX";
    
    // Construcción del Popup con el campo 'desc' (Descripción)
    const popup = `<div class="pw">
      <div class="pc">${o.codigo || 'S/C'}${o.empla ? " &middot; " + o.empla : ""}</div>
      <div class="pn">${o.nombre}</div>
      <span class="pb ${etiquetaClase}">${o.estado}</span>
      <div class="pl"><b>Provincia:</b> ${o.provincia}</div>
      <div class="pl"><b>Proyecto:</b> ${o.proyecto}</div>
      <div class="pl"><b>Gestor:</b> ${o.gestor || '-'}</div>
      <div class="pl"><b>Tipo:</b> ${o.tipo || '-'}</div>
      
      ${o.desc ? `<div class="p-desc">${o.desc}</div>` : ""}
      
      ${o.link ? `<a class="pm" href="${o.link}" target="_blank">&#128205; Ver en Google Maps</a>` : ""}
    </div>`;
    
    L.circleMarker([o.lat, o.lng], {
      radius: 7, 
      color: '#fff', 
      weight: 2, 
      fillColor: color, 
      fillOpacity: 0.9
    }).bindPopup(popup, {maxWidth: 300}).addTo(capa);
  });

  document.getElementById("badge").textContent = vis.length + " obras";
  if(vis.length && mapa) {
    const bounds = L.latLngBounds(vis.map(o => [o.lat, o.lng]));
    mapa.fitBounds(bounds, {padding:[50,50], maxZoom:14});
  }

  // Actualizar estadísticas laterales
  const cnt={};
  vis.forEach(o=>{cnt[o.estado]=(cnt[o.estado]||0)+1});
  document.getElementById("stats").innerHTML=Object.entries(cnt)
    .sort((a,b)=>b[1]-a[1])
    .map(([e,n])=>`<div class="sf"><span>${e}</span><span class="sn">${n}</span></div>`)
    .join("") || `<div style="color:var(--sub);font-size:11px">Sin resultados</div>`;
}

function reset(){
  ["f-q","f-est","f-prov","f-proy","f-tipo","f-gest"].forEach(id => document.getElementById(id).value="");
  filtrar();
}

window.onload = cargarDatos;
</script>
</body>
</html>
