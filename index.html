<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zener - Mapa de Obras</title>

<script>
  // URL del archivo JSON en tu GitHub
  const JSON_URL = "https://raw.githubusercontent.com/raimun00/zener-mapa/main/obras.json";
  const AUTO_REFRESH_MIN = 5;
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root{--azul:#1F3864;--azul2:#2d5096;--accent:#f0a500;--fondo:#f2f4f8;--panel:#fff;--borde:#dde3ed;--texto:#1a2340;--sub:#5a6a8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--fondo);color:var(--texto);height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--azul);color:white;height:50px;padding:0 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1001}
.logo{font-size:17px;font-weight:600}.logo em{color:var(--accent);font-style:normal}
#badge{background:var(--accent);color:var(--azul);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
#hinfo{font-size:11px;color:rgba(255,255,255,.55);margin-left:auto;font-family:"IBM Plex Mono",monospace}
#btn-refresh{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px}

.main{display:flex;flex:1;overflow:hidden;position:relative}

/* Panel Lateral */
#panel{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--borde);display:flex;flex-direction:column;z-index:1000}
.ph{background:var(--azul);color:white;padding:11px 14px;font-size:11px;font-weight:700;text-transform:uppercase}
.filtros{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px}
.fg select, .fg input{width:100%;padding:6px;border:1px solid var(--borde);border-radius:4px;font-size:12px}
#btn-reset{margin:10px;padding:8px;font-size:11px;cursor:pointer}
.stats{border-top:1px solid var(--borde);padding:10px;max-height:200px;overflow-y:auto}
.sf{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.sn{font-weight:700;background:#eee;padding:0 5px;border-radius:4px}

/* Contenedor del Mapa - CRÍTICO */
#map-wrapper{flex:1;position:relative;background:#ddd;display:flex}
#mapa{width:100%;height:100%;min-height:100%} /* Forzamos el alto */

#ov{position:absolute;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000}
.spin{width:30px;height:30px;border:3px solid #ccc;border-top-color:var(--azul);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Estilos Popup */
.pw{min-width:200px}.pn{font-weight:700;color:var(--azul);margin-bottom:5px}
.pb{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#eee}
</style>
</head>
<body>

<header>
  <div class="logo">&#9889; Zener <em>Obras</em></div>
  <span id="badge">0 obras</span>
  <span id="hinfo">Cargando...</span>
  <button id="btn-refresh" onclick="cargarDatos()">Actualizar</button>
</header>

<div class="main">
  <div id="panel">
    <div class="ph">Filtros</div>
    <div class="filtros">
      <div class="fg"><label>Buscar</label><input type="text" id="f-q" oninput="filtrar()"></div>
      <div class="fg"><label>Estado</label><select id="f-est" onchange="filtrar()"><option value="">Todos</option></select></div>
      <div class="fg"><label>Provincia</label><select id="f-prov" onchange="filtrar()"><option value="">Todas</option></select></div>
      <div class="fg"><label>Proyecto</label><select id="f-proy" onchange="filtrar()"><option value="">Todos</option></select></div>
    </div>
    <button id="btn-reset" onclick="reset()">Limpiar Filtros</button>
    <div class="stats">
      <div id="stats"></div>
    </div>
  </div>

  <div id="map-wrapper">
    <div id="ov"><div class="spin"></div><p>Cargando Mapa...</p></div>
    <div id="mapa"></div>
  </div>
</div>

<script>
let obras=[], mapa=null, capa=null;

// Colores para los marcadores
const COLORES = {"EJECUCION DE OBRA":"#198754", "FINALIZADA":"#0d6efd", "PENDIENTE INICIO":"#f0a500"};

function initMapa(){
  if(mapa) return;
  
  // Inicializamos el mapa centrado en España
  mapa = L.map('mapa', {zoomControl: true}).setView([40.41, -3.70], 6);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);
  
  capa = L.layerGroup().addTo(mapa);
  
  // El truco para que Leaflet despierte si el contenedor estaba oculto
  setTimeout(() => { 
    mapa.invalidateSize(); 
    console.log("Mapa redimensionado");
  }, 500);
}

async function cargarDatos(){
  try {
    const r = await fetch(JSON_URL + "?t=" + Date.now());
    const data = await r.json();
    
    // Si el Excel Script devuelve un string, lo parseamos. Si es array, directo.
    obras = Array.isArray(data) ? data : (data.obras ? data.obras : JSON.parse(data));
    
    initMapa();
    poblarSelects();
    filtrar();
    
    document.getElementById("ov").style.display = "none";
    document.getElementById("hinfo").textContent = "Última act: " + new Date().toLocaleTimeString();
  } catch(e) {
    console.error("Error cargando datos:", e);
    document.getElementById("hinfo").textContent = "Error al cargar";
  }
}

function poblarSelects(){
  ["f-est", "f-prov", "f-proy"].forEach(id => {
    const key = id.replace('f-', '');
    const s = document.getElementById(id);
    const valores = [...new Set(obras.map(o => o[key === 'est' ? 'estado' : key]).filter(Boolean))].sort();
    s.innerHTML = "<option value=''>Todos</option>";
    valores.forEach(v => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = v;
      s.appendChild(opt);
    });
  });
}

function filtrar(){
  const q = document.getElementById("f-q").value.toLowerCase();
  const est = document.getElementById("f-est").value;
  const prov = document.getElementById("f-prov").value;
  
  const filtradas = obras.filter(o => {
    const cumpleQ = !q || (o.nombre||"").toLowerCase().includes(q) || (o.codigo||"").toLowerCase().includes(q);
    const cumpleEst = !est || o.estado === est;
    const cumpleProv = !prov || o.provincia === prov;
    return cumpleQ && cumpleEst && cumpleProv;
  });

  capa.clearLayers();
  
  filtradas.forEach(o => {
    if(!o.lat || !o.lng) return;
    
    const color = COLORES[o.estado] || "#666";
    const marker = L.circleMarker([o.lat, o.lng], {
      radius: 8,
      fillColor: color,
      color: "#fff",
      weight: 2,
      fillOpacity: 0.9
    });
    
    marker.bindPopup(`<div class="pw"><div class="pn">${o.nombre}</div><div class="pb">${o.estado}</div></div>`);
    marker.addTo(capa);
  });

  document.getElementById("badge").textContent = filtradas.length + " obras";
  
  // Estadísticas rápidas
  const counts = {};
  filtradas.forEach(o => counts[o.estado] = (counts[o.estado] || 0) + 1);
  document.getElementById("stats").innerHTML = Object.entries(counts)
    .map(([k,v]) => `<div class="sf"><span>${k}</span><span class="sn">${v}</span></div>`).join("");
    
  if(filtradas.length > 0) {
    const group = new L.featureGroup(capa.getLayers());
    mapa.fitBounds(group.getBounds().pad(0.1));
  }
}

function reset(){
  document.getElementById("f-q").value = "";
  document.getElementById("f-est").value = "";
  document.getElementById("f-prov").value = "";
  filtrar();
}

window.onload = cargarDatos;
</script>
</body>
</html>
